
name: Merge to Target

on:
  workflow_call:
    inputs:
      source_branch:
        required: true
        type: string
      target_branch:
        required: true
        type: string

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Fetch target branch
        run: git fetch origin ${{ inputs.target_branch }}:${{ inputs.target_branch }}

      - name: Checkout target branch
        run: git checkout ${{ inputs.target_branch }}

      - name: Merge source into target
        run: git merge --no-ff origin/${{ inputs.source_branch }} -m "Merge origin/${{ inputs.source_branch }} into ${{ inputs.target_branch }}"

      - name: Push target branch
        run: git push origin ${{ inputs.target_branch }}